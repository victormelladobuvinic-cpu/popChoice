<!doctype html>
<html>
    <head>
        <title>PopChoice</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header class="hero-section">
            <img src="" alt="" class="logo">
            <h1 class="app-title">PopChoice</h1>
        </header>
        <form class="prompt-questions">
            
            <div class="question">
                <label for="question1">What’s your favorite movie and why?</label>
                <input type="text" id="question1" name="question1" required>
            </div>

            <div class="question">
                <label for="question2">
                Are you in the mood for something new or a classic?
                </label>
                <input type="text" id="question2" name="question2" required>
            </div>

            <div class="question">
                <label for="question3">
                Do you wanna have fun or do you want something serious?
                </label>
                <input type="text" id="question3" name="question3" required>
            </div>
            <button type="submit" class="letsgo-button">Let's Go</button>
        </form>
        <script type="module" src="index.js"></script>
    </body>
</html>
